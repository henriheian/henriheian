<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Minecraft Block Breaker - Kai's Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Minecraft', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #1a472a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid #8B4513;
            border-radius: 10px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(139, 69, 19, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #000;
            color: #FFD700;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.1em;
            color: #90EE90;
            text-shadow: 2px 2px 0px #000;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 15px;
        }

        .stat {
            background: rgba(139, 69, 19, 0.5);
            border: 2px solid #8B4513;
            padding: 15px 20px;
            border-radius: 5px;
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 0.9em;
            color: #90EE90;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #FFD700;
        }

        .game-area {
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #8B4513;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
        }

        .blocks-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .block {
            width: 120px;
            height: 120px;
            cursor: pointer;
            border: 3px solid #000;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5), 0 4px 8px rgba(0, 0, 0, 0.7);
        }

        .block:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .block:active {
            transform: scale(0.95);
        }

        .block.breaking {
            animation: breakAnimation 0.5s ease-out forwards;
        }

        @keyframes breakAnimation {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.1) rotate(5deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.3) rotate(-10deg);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .game-area.shake {
            animation: shake 0.3s ease-in-out;
        }

        .message {
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            min-height: 40px;
            color: #90EE90;
            text-shadow: 2px 2px 0px #000;
        }

        .message.success {
            color: #FFD700;
            font-size: 1.5em;
        }

        .progression {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(139, 69, 19, 0.3);
            border: 2px solid #8B4513;
            border-radius: 5px;
            gap: 10px;
        }

        .progression-item {
            text-align: center;
            flex: 1;
            font-size: 2em;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .progression-item.active {
            opacity: 1;
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px #FFD700);
        }

        .progression-item.completed {
            opacity: 0.7;
            filter: grayscale(1);
        }

        .progression-arrow {
            font-size: 1.5em;
            color: #8B4513;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: 3px solid #000;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.7);
        }

        .btn-reset {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF4444 100%);
            color: white;
            flex: 1;
        }

        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(255, 107, 107, 0.5);
        }

        .btn-reset:active {
            transform: translateY(-1px);
        }

        .btn-back {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.5);
        }

        .victory-message {
            text-align: center;
            margin: 20px 0;
        }

        .victory-message img {
            max-width: 200px;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .title {
                font-size: 1.8em;
            }

            .block {
                width: 80px;
                height: 80px;
                font-size: 2em;
            }

            .progression {
                flex-wrap: wrap;
            }

            .buttons {
                flex-direction: column;
            }
        }

        /* Estilos dos blocos do Minecraft */
        .block.dirt {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
        }

        .block.stone {
            background: linear-gradient(135deg, #808080 0%, #696969 100%);
        }

        .block.iron {
            background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
        }

        .block.diamond {
            background: linear-gradient(135deg, #00FFFF 0%, #00CED1 100%);
        }

        .block.obsidian {
            background: linear-gradient(135deg, #1A0033 0%, #2D0052 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">⛏️ MINECRAFT BLOCK BREAKER ⛏️</div>
            <div class="subtitle">Clique nos blocos para quebrá-los até chegar na Obsidiana!</div>
        </div>

        <div class="stats-container">
            <div class="stat">
                <div class="stat-label">Blocos Quebrados</div>
                <div class="stat-value" id="blocksDestroyed">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Fase</div>
                <div class="stat-value" id="currentPhase">1/5</div>
            </div>
        </div>

        <div class="progression" id="progression"></div>

        <div class="message" id="message">Comece a quebrar blocos!</div>

        <div class="game-area" id="gameArea">
            <div class="blocks-container" id="blocksContainer"></div>
        </div>

        <div class="buttons">
            <button class="btn-reset" onclick="resetGame()">🔄 REINICIAR</button>
        </div>
    </div>

    <script>
        const BLOCK_TYPES = [
            { name: 'dirt', emoji: '🟫', label: 'Terra', color: '#8B4513' },
            { name: 'stone', emoji: '⬜', label: 'Pedra', color: '#808080' },
            { name: 'iron', emoji: '⚙️', label: 'Ferro', color: '#C0C0C0' },
            { name: 'diamond', emoji: '💎', label: 'Diamante', color: '#00FFFF' },
            { name: 'obsidian', emoji: '🟪', label: 'Obsidiana', color: '#1A0033' }
        ];

        let gameState = {
            currentPhase: 0,
            blocksDestroyed: 0,
            gameWon: false
        };

        function initGame() {
            gameState = {
                currentPhase: 0,
                blocksDestroyed: 0,
                gameWon: false
            };
            renderBlocks();
            updateStats();
            updateProgression();
            updateMessage('Comece a quebrar blocos!');
        }

        function renderBlocks() {
            const container = document.getElementById('blocksContainer');
            container.innerHTML = '';

            const blockType = BLOCK_TYPES[gameState.currentPhase];
            for (let i = 0; i < 3; i++) {
                const block = document.createElement('div');
                block.className = `block ${blockType.name}`;
                block.textContent = blockType.emoji;
                block.onclick = () => breakBlock(block);
                container.appendChild(block);
            }
        }

        function breakBlock(blockElement) {
            if (gameState.gameWon) return;

            blockElement.classList.add('breaking');
            gameState.blocksDestroyed++;

            // Efeito de vibração
            const gameArea = document.getElementById('gameArea');
            gameArea.classList.add('shake');
            setTimeout(() => {
                gameArea.classList.remove('shake');
            }, 300);

            setTimeout(() => {
                if (gameState.currentPhase < BLOCK_TYPES.length - 1) {
                    gameState.currentPhase++;
                    updateMessage(`🎉 Bloco ${gameState.currentPhase + 1} desbloqueado!`);
                    renderBlocks();
                } else {
                    gameState.gameWon = true;
                    updateMessage('🎉 PARABÉNS! VOCÊ VENCEU! 🎉', true);
                    document.getElementById('blocksContainer').innerHTML = `
                        <div style="text-align: center; width: 100%;">
                            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/100/giphy.gif" alt="Victory" width="200" />
                            <p style="color: #FFD700; font-size: 1.3em; margin-top: 20px; text-shadow: 2px 2px 0px #000;">Você é um mestre da mineração!</p>
                        </div>
                    `;
                }
                updateStats();
                updateProgression();
            }, 500);
        }

        function updateStats() {
            document.getElementById('blocksDestroyed').textContent = gameState.blocksDestroyed;
            document.getElementById('currentPhase').textContent = `${gameState.currentPhase + 1}/${BLOCK_TYPES.length}`;
        }

        function updateProgression() {
            const progression = document.getElementById('progression');
            progression.innerHTML = '';

            BLOCK_TYPES.forEach((block, index) => {
                const item = document.createElement('div');
                item.className = 'progression-item';

                if (index < gameState.currentPhase) {
                    item.classList.add('completed');
                } else if (index === gameState.currentPhase) {
                    item.classList.add('active');
                }

                item.textContent = block.emoji;
                progression.appendChild(item);

                if (index < BLOCK_TYPES.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = 'progression-arrow';
                    arrow.textContent = '→';
                    progression.appendChild(arrow);
                }
            });
        }

        function updateMessage(text, isSuccess = false) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = isSuccess ? 'message success' : 'message';
        }

        function resetGame() {
            initGame();
        }

        // Iniciar o jogo
        initGame();
    </script>
</body>
</html>
